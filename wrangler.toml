name = "search"
main = "index.js"
compatibility_date = "2025-04-02"
routes = [{ pattern = "search.twint.my.id", custom_domain = true }, { pattern = "search.twint.us.kg", custom_domain = true }]

[vars]
DEFAULT_SEARCH = "[\"https://4get.{domain}/web?s=%s\",\"https://4get.up.railway.app/web?s=%s\",\"https://5get.{domain}/web?s=%s\",\"https://6get.clovara.{domain}/web?s=%s\"]"
DEFAULT_COMPLETE = "[\"https://4get.{domain}/api/v1/ac?s=%s&scraper=auto\",\"https://4get.up.railway.app/api/v1/ac?s=%s&scraper=auto\",\"https://5get.{domain}/api/v1/ac?s=%s&scraper=auto\",\"https://6get.clovara.{domain}/api/v1/ac?s=%s&scraper=auto\"]"
CACHE_TTL = "60000"
HEALTH_TIMEOUT = "2000"

[observability.logs]
enabled = false

[assets]
directory = "./assets"
binding = "ASSETS"
run_worker_first = true
